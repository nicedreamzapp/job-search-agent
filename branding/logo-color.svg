<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-labelledby="title desc">
  <title id="title">job-search-agent (2-color)</title>
  <desc id="desc">Two-color logo: neutral wordmark with a teal accent on the chevron and inner radar arc.</desc>

  <!-- Mark -->
  <g transform="translate(8 8)" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer arcs in neutral -->
    <path d="M8 40 A 20 20 0 0 1 28 20" stroke="#0B0F14" opacity="0.55" />
    <path d="M8 40 A 28 28 0 0 1 36 12" stroke="#0B0F14" opacity="0.3" />
    <!-- Inner arc + chevron in accent -->
    <path d="M8 40 A 12 12 0 0 1 20 28" stroke="#10B981" />
    <path d="M30 22 L42 10 L42 22 M42 10 L30 10" stroke="#10B981" />
    <!-- Origin pin -->
    <circle cx="8" cy="40" r="2.5" fill="#0B0F14" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(80 0)" fill="#0B0F14">
    <text x="0" y="40" font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', Menlo, monospace"
          font-size="22" font-weight="600" letter-spacing="-0.5">
      job-search-agent
    </text>
  </g>
</svg>
