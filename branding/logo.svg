<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-labelledby="title desc">
  <title id="title">job-search-agent</title>
  <desc id="desc">Horizontal logo lockup: a radar sweep mark with a chevron arrow, followed by the project name in monospace.</desc>

  <!-- Mark: 64x64 box on the left -->
  <g transform="translate(8 8)" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Three radar arcs, ascending sizes, opening to the upper-right -->
    <path d="M8 40 A 12 12 0 0 1 20 28" />
    <path d="M8 40 A 20 20 0 0 1 28 20" opacity="0.7" />
    <path d="M8 40 A 28 28 0 0 1 36 12" opacity="0.4" />
    <!-- Chevron / score arrow pointing upper-right -->
    <path d="M30 22 L42 10 L42 22 M42 10 L30 10" />
    <!-- Origin pin -->
    <circle cx="8" cy="40" r="2.5" fill="currentColor" stroke="none" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(80 0)" fill="currentColor">
    <text x="0" y="40" font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', Menlo, monospace"
          font-size="22" font-weight="600" letter-spacing="-0.5">
      job-search-agent
    </text>
  </g>
</svg>
