<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">job-search-agent — social share card</title>
  <desc id="desc">Open Graph card with the job-search-agent logo, name, and tagline on a dark background.</desc>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0B0F14" />

  <!-- Subtle grid for a technical/builder feel -->
  <g stroke="#1F2937" stroke-width="1" opacity="0.5">
    <path d="M0 105 H1200 M0 210 H1200 M0 315 H1200 M0 420 H1200 M0 525 H1200" />
    <path d="M150 0 V630 M300 0 V630 M450 0 V630 M600 0 V630 M750 0 V630 M900 0 V630 M1050 0 V630" />
  </g>

  <!-- Accent corner glow indicator (no gradient — solid shapes only) -->
  <g opacity="0.18">
    <circle cx="1080" cy="120" r="6" fill="#10B981" />
    <circle cx="1080" cy="120" r="22" fill="none" stroke="#10B981" stroke-width="1.5" />
    <circle cx="1080" cy="120" r="44" fill="none" stroke="#10B981" stroke-width="1" />
  </g>

  <!-- Main mark, scaled up -->
  <g transform="translate(80 180)" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="6">
    <path d="M16 96 A 28 28 0 0 1 44 68" stroke="#10B981" />
    <path d="M16 96 A 50 50 0 0 1 66 46" stroke="#FFFFFF" opacity="0.65" />
    <path d="M16 96 A 72 72 0 0 1 88 24" stroke="#FFFFFF" opacity="0.35" />
    <path d="M70 52 L102 20 L102 52 M102 20 L70 20" stroke="#10B981" />
    <circle cx="16" cy="96" r="6" fill="#FFFFFF" />
  </g>

  <!-- Wordmark -->
  <text x="80" y="380" fill="#FFFFFF"
        font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', Menlo, monospace"
        font-size="72" font-weight="700" letter-spacing="-2">
    job-search-agent
  </text>

  <!-- Tagline -->
  <text x="80" y="445" fill="#9CA3AF"
        font-family="ui-sans-serif, Inter, 'IBM Plex Sans', system-ui, sans-serif"
        font-size="30" font-weight="400" letter-spacing="-0.5">
    Local-first job scout for the AI-native operator era.
  </text>

  <!-- Footer row: meta strip -->
  <g transform="translate(80 540)" font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', Menlo, monospace" font-size="20">
    <text x="0" y="0" fill="#10B981" font-weight="600">$</text>
    <text x="20" y="0" fill="#E5E7EB">pip install job-search-agent</text>
    <text x="430" y="0" fill="#4B5563">— open source — MIT</text>
  </g>
</svg>
